<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Offline | Propvora</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      background: #F6FAFF; color: #0D1B2A;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .card {
      max-width: 380px; text-align: center; background: #fff; border: 1px solid #E2E8F0;
      border-radius: 24px; padding: 32px 28px; box-shadow: 0 10px 40px rgba(13,27,42,0.08);
    }
    .dot { width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 18px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #2563EB, #7C3AED); color: #fff; font-size: 24px; }
    h1 { font-size: 18px; margin: 0 0 8px; }
    p { font-size: 14px; color: #475569; line-height: 1.5; margin: 0 0 20px; }
    button { appearance: none; border: 0; cursor: pointer; background: #2563EB; color: #fff;
      font-weight: 600; font-size: 14px; padding: 10px 20px; border-radius: 12px; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="dot">✦</div>
    <h1>You're offline</h1>
    <p>Propvora needs a connection for live property data. Check your network and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
